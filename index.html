<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Medikit Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="background-animation"></div>

  <div id="alertOverlay" class="alert-overlay hidden">
    <div class="alert-box">
      <div class="alert-ring"></div>
      <h2>MEDICATION TIME!</h2>
      <p id="alertMessage">Drawer 1 needs attention</p>
      <button id="acceptBtn" class="btn btn-glow-green">ACCEPT</button>
    </div>
  </div>

  <header class="glass-panel main-header">
    <div class="logo">
      <div class="glow-orb"></div>
      <h1>NEXUS <span>MEDIKIT</span></h1>
    </div>
    <div class="global-controls">
      <button id="openAllBtn" class="btn btn-outline-cyan">OPEN ALL</button>
      <button id="closeAllBtn" class="btn btn-outline-red">CLOSE ALL</button>
    </div>
  </header>

  <main class="grid-container" id="drawersContainer">
    <!-- Drawer Cards injected via JS -->
  </main>

  <div id="toast" class="toast hidden"></div>

  <!-- Firebase App (the core Firebase SDK) -->
  <script type="module" src="app.js"></script>
</body>
</html>
